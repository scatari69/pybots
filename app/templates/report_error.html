<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>{{ title | default("Simulation failed") }} - simcbots</title>
  <link rel="stylesheet" href="/report.css" />
</head>
<body class="report">
  <main>
    <a class="back-link" href="/">&laquo; Back to simcbots</a>
    <div class="error-box">
      <p>{{ title | default("The simulation failed.") }}</p>
      {% if error %}<pre>{{ error }}</pre>{% endif %}
    </div>
  </main>
</body>
</html>
